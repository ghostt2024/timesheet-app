<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Login - TimeSheet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #1f2937, #111827, #374151, #1f2937); background-size: 400% 400%; animation: gradientBG 15s ease infinite; overflow: hidden; position: relative; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
    .particle { position: absolute; width: 10px; height: 10px; background: rgba(59, 130, 246, 0.3); border-radius: 50%; animation: float 20s infinite; }
    @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
    .login-container { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 2rem; animation: slideIn 0.8s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .login-card { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border-radius: 24px; padding: 3rem 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(59, 130, 246, 0.2); position: relative; overflow: hidden; animation: cardPulse 3s ease-in-out infinite; }
    @keyframes cardPulse { 0%, 100% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 0 rgba(59, 130, 246, 0.4); } 50% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 10px rgba(59, 130, 246, 0); } }
    .login-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(59, 130, 246, 0.1), transparent); transform: rotate(45deg); animation: shimmer 6s infinite; }
    @keyframes shimmer { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }
    .login-header { text-align: center; margin-bottom: 2.5rem; position: relative; z-index: 1; }
    .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; animation: logoBounce 2s ease-in-out infinite; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
    @keyframes logoBounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-10px) rotate(-5deg); } 75% { transform: translateY(5px) rotate(5deg); } }
    .logo i { font-size: 2.5rem; color: white; }
    .login-header h1 { color: #f9fafb; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; animation: fadeInDown 0.8s ease 0.2s both; }
    .login-header p { color: #9ca3af; font-size: 0.95rem; animation: fadeInDown 0.8s ease 0.4s both; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .input-group { margin-bottom: 1.5rem; position: relative; z-index: 1; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #6b7280; font-size: 1.1rem; transition: all 0.3s; }
    .input-field { width: 100%; padding: 1rem 1rem 1rem 3rem; background: rgba(31, 41, 55, 0.8); border: 2px solid #374151; border-radius: 12px; color: #f9fafb; font-size: 1rem; transition: all 0.3s; outline: none; }
    .input-field:focus { border-color: #3b82f6; background: rgba(31, 41, 55, 1); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); transform: translateY(-2px); }
    .input-field:focus + i, .input-wrapper:focus-within i { color: #3b82f6; transform: translateY(-50%) scale(1.1); }
    .input-label { position: absolute; left: 3rem; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 1rem; pointer-events: none; transition: all 0.3s; background: transparent; padding: 0 0.3rem; }
    .input-field:focus ~ .input-label, .input-field:not(:placeholder-shown) ~ .input-label { top: 0; left: 0.8rem; font-size: 0.8rem; color: #3b82f6; background: rgba(17, 24, 39, 0.95); font-weight: 600; }
    .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1.1rem; transition: all 0.3s; padding: 0.3rem; }
    .password-toggle:hover { color: #3b82f6; transform: translateY(-50%) scale(1.2); }
    .login-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; margin-top: 1rem; z-index: 1; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
    .login-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); transition: left 0.6s; }
    .login-btn:hover::before { left: 100%; }
    .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5); }
    .login-btn:active { transform: translateY(-1px); }
    .login-btn.loading { pointer-events: none; opacity: 0.8; }
    .login-btn.loading .btn-text { display: none; }
    .login-btn .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(255, 255, 255, 0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    .login-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; align-items: center; gap: 0.5rem; animation: shake 0.5s ease; position: relative; z-index: 1; }
    .error-message.show { display: flex; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    .login-footer { text-align: center; margin-top: 2rem; color: #6b7280; font-size: 0.85rem; position: relative; z-index: 1; }
    .login-footer a { color: #3b82f6; text-decoration: none; font-weight: 600; transition: all 0.3s; }
    .login-footer a:hover { color: #8b5cf6; text-decoration: underline; }
    @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem; } .login-header h1 { font-size: 1.5rem; } }
    .success-checkmark { display: none; width: 80px; height: 80px; margin: 0 auto 1.5rem; animation: scaleIn 0.5s ease; }
    .success-checkmark.show { display: block; }
    @keyframes scaleIn { from { transform: scale(0); } 50% { transform: scale(1.2); } to { transform: scale(1); } }
    .checkmark { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4); }
    .checkmark i { font-size: 3rem; color: white; animation: checkPop 0.5s ease 0.3s both; }
    @keyframes checkPop { from { transform: scale(0); } 50% { transform: scale(1.3); } to { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo" id="logo"><i class="fas fa-user-clock"></i></div>
        <h1>Welcome Back</h1>
        <p>Login to access your dashboard</p>
      </div>
      <div class="error-message" id="errorMessage"><i class="fas fa-exclamation-circle"></i><span id="errorText">Invalid credentials</span></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <div class="input-wrapper">
            <input type="text" class="input-field" id="userId" placeholder=" " required autocomplete="off">
            <i class="fas fa-user"></i>
            <label class="input-label">User ID</label>
          </div>
        </div>
        <div class="input-group">
          <div class="input-wrapper">
            <input type="password" class="input-field" id="password" placeholder=" " required>
            <i class="fas fa-lock"></i>
            <label class="input-label">Password</label>
            <button type="button" class="password-toggle" onclick="togglePassword()"><i class="fas fa-eye" id="eyeIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="login-btn" id="loginBtn"><span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span><div class="spinner"></div></button>
      </form>
      <div class="login-footer">
        <p>TimeSheet Management System</p>
        <p style="margin-top: 0.5rem; font-size: 0.8rem;">© 2026 All rights reserved</p>
      </div>
    </div>
  </div>

  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 20 + 's';
        p.style.animationDuration = (Math.random() * 20 + 10) + 's';
        p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
        p.style.opacity = Math.random() * 0.5 + 0.1;
        container.appendChild(p);
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
      else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMessage').classList.add('show');
      setTimeout(() => document.getElementById('errorMessage').classList.remove('show'), 5000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const logo = document.getElementById('logo');
      
      btn.classList.add('loading');
      logo.style.animation = 'logoBounce 0.5s ease-in-out infinite';
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          // ✅ SECURITY: Use sessionStorage (clears when tab/browser closes)
          sessionStorage.setItem('token', data.token);
          sessionStorage.setItem('role', data.role);
          sessionStorage.setItem('name', data.name);
          
          btn.innerHTML = '<div class="success-checkmark show"><div class="checkmark"><i class="fas fa-check"></i></div></div>';
          setTimeout(() => {
            window.location.href = data.role === 'admin' ? '/admin.html' : '/worker.html';
          }, 1000);
        } else {
          showError(data.error || 'Login failed');
          btn.classList.remove('loading');
          logo.style.animation = 'logoBounce 2s ease-in-out infinite';
          document.querySelector('.login-card').style.animation = 'shake 0.5s ease';
          setTimeout(() => document.querySelector('.login-card').style.animation = 'cardPulse 3s ease-in-out infinite', 500);
        }
      } catch (err) {
        console.error(err);
        showError('Connection error');
        btn.classList.remove('loading');
        logo.style.animation = 'logoBounce 2s ease-in-out infinite';
      }
    }

    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('focus', () => input.parentElement.parentElement.style.transform = 'scale(1.02)');
      input.addEventListener('blur', () => input.parentElement.parentElement.style.transform = 'scale(1)');
    });

    document.addEventListener('keypress', e => {
      if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });

    createParticles();
  </script>
</body>
</html>
